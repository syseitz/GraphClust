name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          channels: bioconda,conda-forge,defaults
          channel-priority: strict
          environment-file: ci/environment.yml
          activate-environment: graphclust-ci

      # LLVM from Homebrew provides a clang++ that supports -fopenmp natively.
      # Apple's system clang++ does not support -fopenmp.
      - name: Install LLVM (macOS only)
        if: runner.os == 'macOS'
        run: brew install llvm

      # The bundled config.sub and install-sh are from 2013.  Fetch current
      # versions from GNU upstream: config.sub/guess for modern host triples,
      # install-sh because the old version uses plain mkdir (fails on macOS
      # when the target directory already exists).
      - name: Update config.sub / config.guess / install-sh
        run: |
          BASE="https://git.savannah.gnu.org/cgit"
          curl -fsSL "${BASE}/config.git/plain/config.sub"       -o config.sub
          curl -fsSL "${BASE}/config.git/plain/config.guess"     -o config.guess
          curl -fsSL "${BASE}/automake.git/plain/lib/install-sh" -o install-sh
          chmod +x install-sh

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        shell: bash -el {0}
        run: |
          ./configure \
            --prefix="$GITHUB_WORKSPACE/dist" \
            --with-vrna="$CONDA_PREFIX"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        shell: bash -el {0}
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          ./configure \
            --prefix="$GITHUB_WORKSPACE/dist" \
            --with-vrna="$CONDA_PREFIX" \
            CC="${LLVM_PREFIX}/bin/clang" \
            CXX="${LLVM_PREFIX}/bin/clang++" \
            CXXFLAGS="-O3" \
            CFLAGS="-O3"

      - name: Build
        shell: bash -el {0}
        run: |
          CPUS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          make -j"$CPUS"

      - name: Install
        shell: bash -el {0}
        run: make install

      - name: Perl syntax checks
        shell: bash -el {0}
        run: |
          perl -c MASTER_GraphClust.pl
          perl -c gc_cmsearch.pl
          perl -c fasta2shrep_gspan.pl

      # Verify the --threads patch landed in the installed script.
      # We grep the source rather than --help because pod2usage -verbose 1
      # only prints the SYNOPSIS section (which does not list individual flags).
      - name: Smoke test – --threads flag
        shell: bash -el {0}
        run: |
          grep -q '"threads=i"' \
            "$GITHUB_WORKSPACE/dist/bin/MASTER_GraphClust.pl" \
            && echo "OK: --threads flag present" \
            || { echo "FAIL: --threads flag missing"; exit 1; }

      # Full pipeline integration test.
      # Runs the complete 9-stage pipeline on 10 synthetic sequences (2 groups
      # of 5 near-identical sequences that should cluster together).
      # Uses only tools available in the conda environment:
      #   no blastclust (input_blastclust=0), no CMfinder (center_model_type=3).
      - name: Pipeline integration test
        shell: bash -el {0}
        run: |
          export PATH="$GITHUB_WORKSPACE/dist/bin:$PATH"
          WORK=$(mktemp -d /tmp/gc_ci_test.XXXXXX)
          trap 'rm -rf "$WORK"' EXIT

          echo "=== Running GraphClust pipeline on ci/test.fasta ==="
          MASTER_GraphClust.pl \
            --root   "$WORK" \
            --fasta  "$GITHUB_WORKSPACE/ci/test.fasta" \
            --config "$GITHUB_WORKSPACE/ci/test.config" \
            --threads 2

          echo "=== Checking pipeline output ==="
          # Stage 2 done: GSPAN graphs were built
          [[ -f "$WORK/GSPAN/gspan.DONE" ]] \
            && echo "OK: Stage 2 (GSPAN) completed" \
            || { echo "FAIL: GSPAN stage did not finish"; ls "$WORK/" 2>/dev/null; exit 1; }

          # Stage 3 done: NSPDK feature vectors were computed
          [[ -f "$WORK/SVECTOR/svector.groups.DONE" ]] \
            && echo "OK: Stage 3 (NSPDK vectors) completed" \
            || { echo "FAIL: NSPDK vector stage did not finish"; exit 1; }

          # Stage 5 done: density clustering produced at least one cluster
          [[ -f "$WORK/SVECTOR/data.svector.fast_cluster.1.DONE" ]] \
            && echo "OK: Stage 5 (NSPDK clustering) completed" \
            || { echo "FAIL: NSPDK clustering did not finish"; exit 1; }

          # Final results directory exists
          [[ -d "$WORK/RESULTS" ]] \
            && echo "OK: RESULTS directory present" \
            || { echo "FAIL: RESULTS directory missing"; exit 1; }

          echo "=== Pipeline integration test passed ==="
