name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          channels: bioconda,conda-forge,defaults
          channel-priority: strict
          environment-file: ci/environment.yml
          activate-environment: graphclust-ci

      # Apple clang ships without OpenMP runtime; install it via Homebrew
      - name: Install libomp (macOS only)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        shell: bash -el {0}
        run: |
          ./configure \
            --prefix="$GITHUB_WORKSPACE/install" \
            --with-vrna="$CONDA_PREFIX"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        shell: bash -el {0}
        run: |
          OMP_PREFIX="$(brew --prefix libomp)"
          ./configure \
            --prefix="$GITHUB_WORKSPACE/install" \
            --with-vrna="$CONDA_PREFIX" \
            CXXFLAGS="-O3 -Xpreprocessor -fopenmp -I${OMP_PREFIX}/include" \
            CFLAGS="-O3" \
            LDFLAGS="-L${OMP_PREFIX}/lib -lomp"

      - name: Build
        shell: bash -el {0}
        run: |
          CPUS=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          make -j"$CPUS"

      - name: Install
        shell: bash -el {0}
        run: make install

      - name: Perl syntax checks
        shell: bash -el {0}
        run: |
          perl -c MASTER_GraphClust.pl
          perl -c gc_cmsearch.pl
          perl -c fasta2shrep_gspan.pl

      - name: Smoke test – --threads flag
        shell: bash -el {0}
        run: |
          "$GITHUB_WORKSPACE/install/bin/MASTER_GraphClust.pl" --help 2>&1 \
            | grep -qi "thread" \
            && echo "OK: --threads flag present" \
            || { echo "FAIL: --threads flag missing"; exit 1; }
